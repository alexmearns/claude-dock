name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tkinter
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: Run smoke tests
        run: python -m unittest discover tests -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Claude Dock.exe
            upload-name: claude-dock-windows
            upload-path: Claude Dock.exe
          - os: macos-latest
            artifact: Claude Dock.app
            upload-name: claude-dock-macos
            upload-path: claude-dock-macos.zip
          - os: ubuntu-latest
            artifact: claude-dock
            upload-name: claude-dock-linux
            upload-path: claude-dock

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Build
        run: python build.py

      - name: Package macOS .app as zip
        if: matrix.os == 'macos-latest'
        run: ditto -c -k --sequesterRsrc --keepParent "Claude Dock.app" claude-dock-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.upload-path }}
