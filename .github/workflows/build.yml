name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tagged: ${{ steps.tag.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version
        id: get-version
        run: |
          VERSION=$(python -c "import re; m=re.search(r'__version__\s*=\s*\"(.+?)\"', open('dock.py').read()); print(m.group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Tag if new
        id: tag
        run: |
          TAG="v${{ steps.get-version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release"
            echo "tagged=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "tagged=true" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tkinter
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: Run smoke tests
        run: python -m unittest discover tests -v

  build:
    needs: [test, auto-tag]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (
        needs.auto-tag.result == 'skipped' ||
        needs.auto-tag.outputs.tagged == 'true' ||
        startsWith(github.ref, 'refs/tags/v')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            upload-name: claude-dock-windows
            upload-path: Claude Dock.exe
          - os: macos-latest
            upload-name: claude-dock-macos
            upload-path: claude-dock-macos.zip
          - os: ubuntu-latest
            upload-name: claude-dock-linux
            upload-path: claude-dock

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Build
        run: python build.py

      - name: Package macOS .app as zip
        if: matrix.os == 'macos-latest'
        run: ditto -c -k --sequesterRsrc --keepParent "Claude Dock.app" claude-dock-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload-name }}
          path: ${{ matrix.upload-path }}
          if-no-files-found: error

      - name: Attach to release
        if: needs.auto-tag.outputs.tagged == 'true' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tagged == 'true' && format('v{0}', needs.auto-tag.outputs.version) || github.ref_name }}
          files: ${{ matrix.upload-path }}
